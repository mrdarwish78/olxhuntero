name: Phone Hunter Scraper

on:
  schedule:
    # Peak hours (10 AM - 10 PM Egypt = 7 AM - 7 PM UTC): every hour
    - cron: '0 7-19 * * *'
    # Bulk catch-up (2 AM, 6 AM Egypt = 11 PM, 3 AM UTC)
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      bulk_mode:
        description: 'Run in bulk mode (wider time window)'
        type: boolean
        default: false

jobs:
  scrape:
    runs-on: ubuntu-24.04
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BULK_MODE: ${{ inputs.bulk_mode || (github.event.schedule == '0 23 * * *' || github.event.schedule == '0 3 * * *') && 'true' || 'false' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit state files
        run: |
          git config user.name "phone-hunter-bot"
          git config user.email "bot@phone-hunter.local"
          git add processed_ids.txt market_database.csv system_logs.csv
          git diff --staged --quiet || git commit -m "auto: update state $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git pull --rebase origin main
          git push
